name: CI/CD - Terraform + Cloud Run

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read

env:
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'main-personal-account' || 'develop' }}

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      CERTIFICATES_BUCKET: ${{ vars.CERTIFICATES_BUCKET }}
      E2E_TEMPLATE_URL: ${{ vars.E2E_TEMPLATE_URL }}
      E2E_DATA_SOURCE_URL: ${{ vars.E2E_DATA_SOURCE_URL }}
      SKIP_ENV_VALIDATION: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DB_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          export_default_credentials: 'true'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test --project=chromium

  terraform-plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'main-personal-account' || 'develop' }}
    needs: test

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Setup Terraform environment
        uses: ./.github/actions/terraform-env
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.GCP_REGION }}
          branch: ${{ github.ref_name }}
          google_client_id: ${{ vars.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          google_refresh_token: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          google_drive_folder_id: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          db_url: ${{ secrets.DB_URL }}
          db_direct_url: ${{ secrets.DB_DIRECT_URL }}
          ga_id: ${{ vars.GA_ID }}
          next_public_base_url: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          owner_email: ${{ vars.OWNER_EMAIL }}
          drive_link: ${{ vars.DRIVE_LINK }}
          form2_link: ${{ vars.FORM2_LINK }}

      - name: Create Terraform state bucket if not exists
        run: |
          if ! gcloud storage buckets describe gs://$TF_BACKEND_BUCKET --project=${{ env.GCP_PROJECT_ID }} > /dev/null 2>&1; then
            gcloud storage buckets create gs://$TF_BACKEND_BUCKET --project=${{ env.GCP_PROJECT_ID }} --location=${{ env.GCP_REGION }} --uniform-bucket-level-access
          fi

      - name: Enable required GCP API
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com --project=${{ env.GCP_PROJECT_ID }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="bucket=$TF_BACKEND_BUCKET"

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./terraform/tfplan

      - name: Upload Cloud Functions Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-functions-build
          path: cloud-functions/builds

  terraform-apply:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'main-personal-account' || 'develop' }}
    needs: terraform-plan

    outputs:
      artifact_path: ${{ steps.get_artifact_path.outputs.artifact_path }}
      cloud_run_name: ${{ steps.get_service_name.outputs.cloud_run_name }}
      # generate_pdfs_cloud_run_name: ${{ steps.get_generate_pdfs_service_name.outputs.generate_pdfs_cloud_run_name }}

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Setup Terraform environment
        uses: ./.github/actions/terraform-env
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.GCP_REGION }}
          branch: ${{ github.ref_name }}
          google_client_id: ${{ vars.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          google_refresh_token: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          google_drive_folder_id: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          db_url: ${{ secrets.DB_URL }}
          db_direct_url: ${{ secrets.DB_DIRECT_URL }}
          ga_id: ${{ vars.GA_ID }}
          next_public_base_url: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          owner_email: ${{ vars.OWNER_EMAIL }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="bucket=$TF_BACKEND_BUCKET"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./terraform

      - name: Download Cloud Functions Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: cloud-functions-build
          path: cloud-functions/builds

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Get Artifact Registry Path from Terraform
        id: get_artifact_path
        working-directory: ./terraform
        run: |
          REPO_PATH=$(terraform output -raw artifact_registry_path)
          echo "artifact_registry_path=${REPO_PATH}" >> $GITHUB_OUTPUT
          echo "${REPO_PATH}" > artifact_registry_path.txt

      - name: Upload Artifact Registry Path
        uses: actions/upload-artifact@v4
        with:
          name: artifact-registry-path
          path: ./terraform/artifact_registry_path.txt

      - name: Get Service Name from Terraform
        id: get_service_name
        working-directory: ./terraform
        run: |
          echo "cloud_run_name=$(terraform output -raw cloud_run_name)" >> $GITHUB_OUTPUT

      # - name: Get generate_pdfs Service Name from Terraform
      #   id: get_generate_pdfs_service_name
      #   working-directory: ./terraform
      #   run: |
      #     echo "generate_pdfs_cloud_run_name=$(terraform output -raw generate_pdfs_cloud_run_name)" >> $GITHUB_OUTPUT

  deploy-certificate-management:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'main-personal-account' || 'develop' }}
    needs: terraform-apply

    env:
      CLOUD_RUN_NAME: ${{ needs.terraform-apply.outputs.cloud_run_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          export_default_credentials: 'true'

      - name: Download Artifact Path
        uses: actions/download-artifact@v4
        with:
          name: artifact-registry-path

      - name: Read Artifact Registry Path
        id: read_artifact_registry_path
        run: echo "ARTIFACT_REGISTRY_PATH=$(cat artifact_registry_path.txt)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            --build-arg DB_URL="${{ secrets.DB_URL }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ vars.NEXT_PUBLIC_BASE_URL }}" \
            -t $ARTIFACT_REGISTRY_PATH/certificate-management:$GITHUB_SHA .

      - name: Push image
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
          docker push $ARTIFACT_REGISTRY_PATH/certificate-management:$GITHUB_SHA

      - name: Run Database Migrations
        run: |
          docker run --rm \
            -e DB_URL="${{ secrets.DB_DIRECT_URL }}" \
            $ARTIFACT_REGISTRY_PATH/certificate-management:$GITHUB_SHA \
            npm run prisma:deploy
        continue-on-error: false

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $CLOUD_RUN_NAME \
            --image $ARTIFACT_REGISTRY_PATH/certificate-management:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated

