name: Terraform Environment Setup
description: Export TF_VAR_* env vars, compute backend bucket, and install Terraform

inputs:
  project_id:
    required: true
  region:
    required: true
  branch:
    required: true
  google_client_id:
    required: true
  google_client_secret:
    required: true
  google_refresh_token:
    required: true
  google_drive_folder_id:
    required: true
  gemini_api_key:
    required: true
  brevo_api_key:
    required: true
  db_url:
    required: true
  db_direct_url:
    required: true
  ga_id:
    required: true
  next_public_base_url:
    required: true
  owner_email:
    required: true
  drive_link:
    required: false
  form2_link:
    required: false

runs:
  using: composite
  steps:
    - name: Export Terraform variables (TF_VAR_*)
      shell: bash
      env:
        DB_URL: ${{ inputs.db_url }}
        DB_DIRECT_URL: ${{ inputs.db_direct_url }}
        GOOGLE_CLIENT_ID: ${{ inputs.google_client_id }}
        GOOGLE_CLIENT_SECRET: ${{ inputs.google_client_secret }}
        GA_ID: ${{ inputs.ga_id }}
        NEXT_PUBLIC_BASE_URL: ${{ inputs.next_public_base_url }}
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        BREVO_API_KEY: ${{ inputs.brevo_api_key }}
        OWNER_EMAIL: ${{ inputs.owner_email }}
        DRIVE_LINK: ${{ inputs.drive_link }}
        FORM2_LINK: ${{ inputs.form2_link }}
        SUFFIX: ${{ inputs.branch == 'main' && '' || format('-{0}', inputs.branch) }}
      run: |
        echo "TF_VAR_project_id=${{ inputs.project_id }}" >> $GITHUB_ENV
        echo "TF_VAR_region=${{ inputs.region }}" >> $GITHUB_ENV
        echo "TF_VAR_branch=${{ inputs.branch }}" >> $GITHUB_ENV
        echo "TF_VAR_google_client_id=${{ inputs.google_client_id }}" >> $GITHUB_ENV
        echo "TF_VAR_google_client_secret=${{ inputs.google_client_secret }}" >> $GITHUB_ENV
        echo "TF_VAR_google_refresh_token=${{ inputs.google_refresh_token }}" >> $GITHUB_ENV
        echo "TF_VAR_google_drive_folder_id=${{ inputs.google_drive_folder_id }}" >> $GITHUB_ENV
        echo "TF_VAR_brevo_api_key=${{ inputs.brevo_api_key }}" >> $GITHUB_ENV
        TF_ENV_VARS=$(jq -nc '{
          DB_URL: env.DB_URL,
          DB_DIRECT_URL: env.DB_DIRECT_URL,
          GOOGLE_CLIENT_ID: env.GOOGLE_CLIENT_ID,
          GOOGLE_CLIENT_SECRET: env.GOOGLE_CLIENT_SECRET,
          GA_ID: env.GA_ID,
          SUFFIX: env.SUFFIX,
          NEXT_PUBLIC_BASE_URL: env.NEXT_PUBLIC_BASE_URL,
          GEMINI_API_KEY: env.GEMINI_API_KEY,
          BREVO_API_KEY: env.BREVO_API_KEY,
          OWNER_EMAIL: env.OWNER_EMAIL,
          DRIVE_LINK: env.DRIVE_LINK,
          FORM2_LINK: env.FORM2_LINK
        }')
        echo "TF_VAR_environment_variables=$TF_ENV_VARS" >> $GITHUB_ENV

    - name: Export Terraform backend
      shell: bash
      run: |
        if [ "${{ inputs.branch }}" = "main" ]; then SUFFIX=""; else SUFFIX="-${{ inputs.branch }}"; fi
        PROJECT_HASH=$(echo -n "${{ inputs.project_id }}" | md5sum | cut -c1-8)
        echo "TF_BACKEND_BUCKET=tf-state${SUFFIX}-${PROJECT_HASH}" >> $GITHUB_ENV

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
